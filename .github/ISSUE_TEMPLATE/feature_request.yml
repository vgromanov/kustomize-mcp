name: Feature request
description: Suggest a new MCP tool, prompt, or behavior
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the current set of tools doesn't support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What should the new tool / flag / behavior look like? Reference
        [mbrt/kustomize-mcp](https://github.com/mbrt/kustomize-mcp) or Flux docs where relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
